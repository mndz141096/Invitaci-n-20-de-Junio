<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almuerzo de Celebración — Juan Alberto Méndez Urizar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a0f0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #231209;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #6B3A1F;
    }

    .top {
      background: #2E1A0E;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    .ornament {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.4rem;
    }
    .orn-line { width: 40px; height: 1px; background: #C07B3A; }
    .orn-diamond {
      width: 7px; height: 7px;
      background: #E8A84A;
      transform: rotate(45deg);
    }

    .icon { font-size: 34px; margin-bottom: 0.7rem; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #C07B3A;
      margin-bottom: 1rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 600;
      color: #F0C97A;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: #D4956A;
      margin-bottom: 1.6rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.4rem;
    }
    .divider-line { flex: 1; height: 1px; background: #6B3A1F; }
    .divider-dot { width: 5px; height: 5px; background: #E8A84A; border-radius: 50%; }

    .invite-text {
      font-size: 14px;
      color: #C9A882;
      font-style: italic;
    }

    .body {
      padding: 1.8rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .detail-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-circle {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #2E1A0E;
      border: 1px solid #6B3A1F;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
    }

    .detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #C07B3A;
      margin-bottom: 3px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 500;
      color: #F1EDE4;
    }

    .footer {
      border-top: 1px solid #6B3A1F;
      padding: 1.4rem 2rem;
      text-align: center;
    }

    .waze-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #05C8F7;
      color: #0e0922;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 50px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .waze-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <div class="card">

    <div class="top">
      <div class="ornament">
        <div class="orn-line"></div>
        <div class="orn-diamond"></div>
        <div class="orn-line"></div>
      </div>
      
      <p class="eyebrow">Almuerzo de Celebración</p>
      <h1 class="name">Juan Alberto<br>Méndez Urizar</h1>
      
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>
      <p class="invite-text">Te invita a compartir un momento especial</p>
    </div>

    <div class="body">
      <div class="detail-row">
        <div class="icon-circle">📅</div>
        <div>
          <p class="detail-label">Fecha</p>
          <p class="detail-value">Sábado 20 de junio, 2026</p>
        </div>
      </div>
      <div class="detail-row">
        <div class="icon-circle">🕐</div>
        <div>
          <p class="detail-label">Hora</p>
          <p class="detail-value">1:00 PM</p>
        </div>
      </div>
      <div class="detail-row">
        <div class="icon-circle">📍</div>
        <div>
          <p class="detail-label">Lugar</p>
          <p class="detail-value">Vistas de Boca del Monte</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <a class="waze-btn" href="https://waze.com/ul/h9fxdu027z" target="_blank" rel="noopener">
        🗺️ Cómo llegar en Waze
      </a>
    </div>

  </div>

</body>
</html>
